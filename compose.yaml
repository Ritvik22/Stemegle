name: stemegle

services:
  migrate:
    build:
      context: ${APP_SOURCE_DIR:-.}
      dockerfile: deploy/migrations/Dockerfile
    image: stemegle-migrations:latest
    environment:
      POSTGRES_URL_NON_POOLING: ${POSTGRES_URL_NON_POOLING:-}
      POSTGRES_URL: ${POSTGRES_URL:-}
    profiles:
      - migration

  analytics:
    build:
      context: ${APP_SOURCE_DIR:-.}
      dockerfile: deploy/analytics/Dockerfile
    image: stemegle-analytics:latest
    container_name: stemegle_analytics
    restart: unless-stopped
    environment:
      PORT: 8787
      SUPABASE_URL: ${VITE_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ANALYTICS_COOKIE_SECRET: ${ANALYTICS_COOKIE_SECRET:-}
    ports:
      - "127.0.0.1:${STEMEGLE_ANALYTICS_PORT:-8098}:8787"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: ${APP_SOURCE_DIR:-.}
      dockerfile: ${APP_DOCKERFILE:-Dockerfile}
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_SITE_URL: ${VITE_SITE_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-${VITE_SUPABASE_URL}}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-${VITE_SUPABASE_ANON_KEY}}
    image: stemegle:latest
    container_name: stemegle_app
    restart: unless-stopped
    depends_on:
      analytics:
        condition: service_healthy
    ports:
      - "127.0.0.1:${STEMEGLE_PORT:-8097}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:2026.3.0
    container_name: stemegle_tunnel
    depends_on:
      app:
        condition: service_healthy
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    restart: unless-stopped
    profiles:
      - tunnel

  autodeploy:
    build:
      context: .
      dockerfile: deploy/webhook/Dockerfile
    image: stemegle-autodeploy:latest
    container_name: stemegle_autodeploy
    restart: unless-stopped
    environment:
      DEPLOY_BRANCH: ${DEPLOY_BRANCH:-main}
      DEPLOY_DIR: /repo
      DEPLOY_REPO: ${DEPLOY_REPO:-ritvik22/stemegle}
      DEPLOY_SOURCE_DIR: /repo/source
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      STEMEGLE_PORT: ${STEMEGLE_PORT:-8097}
      STEMEGLE_ANALYTICS_PORT: ${STEMEGLE_ANALYTICS_PORT:-8098}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ANALYTICS_COOKIE_SECRET: ${ANALYTICS_COOKIE_SECRET:-}
    volumes:
      - ./:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - autodeploy
