map $http_upgrade $stemegle_connection_upgrade {
  default upgrade;
  '' close;
}

map $http_cf_connecting_ip $stemegle_client_ip {
  default $http_cf_connecting_ip;
  '' $remote_addr;
}

map $http_x_forwarded_proto $stemegle_forwarded_proto {
  default $http_x_forwarded_proto;
  '' $scheme;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location ^~ /api/ {
    client_max_body_size 192k;
    proxy_pass http://backend:8787;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $stemegle_client_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto $stemegle_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $stemegle_connection_upgrade;
    proxy_connect_timeout 5s;
    proxy_read_timeout 75s;
    proxy_send_timeout 75s;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
